name: Tests + publication GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  quality:
    # Garde-fous qualité/sécurité (constat A2). ruff et bandit sont verts
    # et bloquants ; pip-audit reste informatif (une CVE amont ne doit pas
    # bloquer la publication tant qu'aucun correctif n'existe).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Outils d'analyse
        run: pip install ruff bandit pip-audit
      - name: Lint (ruff)
        run: ruff check .
      - name: Analyse de sécurité statique (bandit)
        run: bandit -r app mesh reporting connectors sim -ll
      - name: Vulnérabilités des dépendances (pip-audit, informatif)
        run: pip-audit -r requirements.txt || true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Dépendance entrepôt analytique (version épinglée)
        run: pip install -r requirements.txt
      - name: Tests du noyau
        run: python3 -m unittest discover -s tests -v
      - name: Export statique du dashboard + explorateur
        run: python3 -m app export
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
